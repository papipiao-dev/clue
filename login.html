<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="manifest" href="/manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="线索管理">
    
    <link rel="apple-touch-icon" href="/icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 线索管理系统</title>
    <style>
        /* 基础重置 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 模拟手机屏幕容器 (方便在PC上预览，如果在手机上会自动撑满) */
        .mobile-container {
            width: 100%;
            max-width: 414px; /* iPhone 屏幕宽度参考 */
            height: 100vh;
            max-height: 896px;
            position: relative;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            padding: 60px 30px 30px 30px;
        }

        /* 顶部插图区 */
        .illustration {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            margin-top: 40px;
        }

        /* 标题 */
        .title {
            text-align: center;
            font-size: 26px;
            color: #333333;
            font-weight: 500;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        /* 表单区域 */
        .form-group {
            margin-bottom: 20px;
        }

        /* 输入框容器 */
        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: #f5f6f8;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #e5e7eb;
            transition: border-color 0.3s ease;
        }

        /* 选中状态的输入框 (第一项) */
        .input-wrapper.active {
            border-color: #3b82f6; /* 蓝色边框 */
            background-color: #f8fbff;
        }

        /* 图标 */
        .input-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            color: #9ca3af;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 输入框本体 */
        .input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 16px;
            color: #333333;
        }

        .input-wrapper input::placeholder {
            color: #9ca3af;
        }
        
        /* 模拟设计稿中的闪烁光标效果（竖线） */
        .input-wrapper.active input {
            border-left: 1px solid #333;
            padding-left: 2px;
            margin-left: -3px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { border-color: transparent; }
            50% { border-color: #333; }
        }

        /* 登录按钮 */
        .btn-login {
            width: 100%;
            background-color: #2b8cff;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 18px;
            font-weight: 500;
            margin-top: 15px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: background-color 0.3s;
        }

        .btn-login:active {
            background-color: #1a73e8;
        }

        .btn-login:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        /* 底部 iOS Home Indicator */
        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 5px;
            background-color: #000000;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="mobile-container">
    
    <div class="illustration">
        <svg width="120" height="100" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
            <polyline points="0,0 0,80 120,80" fill="none" stroke="#cbd5e1" stroke-width="2"/>
            <rect x="20" y="45" width="15" height="35" fill="#9ca3af" rx="2" />
            <rect x="50" y="28" width="15" height="52" fill="#9ca3af" rx="2" />
            <rect x="80" y="10" width="15" height="70" fill="#3b82f6" rx="2" />
            <polyline points="10,55 40,36 70,46 100,-8" fill="none" stroke="#1e293b" stroke-width="2"/>
            <circle cx="10" cy="55" r="2.5" fill="#1e293b"/>
            <circle cx="40" cy="36" r="2.5" fill="#1e293b"/>
            <circle cx="70" cy="46" r="2.5" fill="#1e293b"/>
            <circle cx="100" cy="-8" r="2.5" fill="#1e293b"/>
        </svg>
    </div>

    <h1 class="title">线索管理系统 v1.0</h1>

    <form id="loginForm">
        
        <div class="form-group">
            <div class="input-wrapper active">
                <div class="input-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <input type="text" id="accountInput" placeholder="请输入账号" autocomplete="off" />
            </div>
        </div>

        <div class="form-group">
            <div class="input-wrapper">
                <div class="input-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <input type="password" id="passwordInput" placeholder="请输入密码" autocomplete="off" />
            </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">登录</button>
        
    </form>

    <div class="home-indicator"></div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // 【优化】如果用户已经有 token（之前登录过了），直接跳到提报记录页，不用再登一次
        const userToken = localStorage.getItem('user_token');
        if (userToken) {
            window.location.href = 'record.html';
        }
    });

    // 注册 PWA 的 Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                console.log('PWA ServiceWorker 注册成功！');
            }).catch(err => {
                console.log('PWA 注册失败: ', err);
            });
        });
    }

    // 使用相对路径，自动适配当前访问的域名或 IP
    // 修改后
    const API_BASE_URL = '/api';
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault(); 

        const account = document.getElementById('accountInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();

        if (!account || !password) {
            alert("请输入账号和密码！");
            return;
        }

        loginBtn.innerText = "登录中...";
        loginBtn.disabled = true;

        try {
            const response = await fetch(`${API_BASE_URL}/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ account, password })
            });

            const result = await response.json();

            if (result.code === 200) {
                // 登录成功，把 token 存入浏览器的 localStorage 中
                localStorage.setItem('user_token', result.data.token);
                localStorage.setItem('user_name', result.data.user_name);
                
                // 跳转到提报记录页
                window.location.href = 'record.html';
            } else {
                alert(result.message); // 弹出报错（比如账号密码错误）
            }
        } catch (error) {
            console.error("登录请求失败:", error);
            alert("网络错误，请检查 Python 后端是否已在 8888 端口启动！");
        } finally {
            loginBtn.innerText = "登录";
            loginBtn.disabled = false;
        }
    });

    // 简单的输入框交互：点击时高亮边框
    const wrappers = document.querySelectorAll('.input-wrapper');
    const inputs = document.querySelectorAll('.input-wrapper input');
    
    inputs.forEach((input, index) => {
        input.addEventListener('focus', () => {
            wrappers.forEach(w => w.classList.remove('active'));
            wrappers[index].classList.add('active');
        });
    });
</script>
</body>
</html>
