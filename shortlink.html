        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-stack); background-color: var(--bg-color); color: var(--text-color-body); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
        .app-viewport { width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background-color: var(--bg-color); position: relative;}
        .main-content { flex: 1; overflow-y: auto; padding: 20px 20px 100px 20px; }
        .page-header h1 { font-size: 28px; font-weight: 700; color: var(--text-color-title); margin-bottom: 20px; }
        .value-black { color: var(--text-color-title); }
        #page-short-link .coming-soon-container { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding-bottom: 80px; }
        .coming-soon-icon { width: 32px; height: 32px; background-image: var(--icon-link); background-size: contain; background-repeat: no-repeat; opacity: 0.3; margin-bottom: 8px; }
        .coming-soon-text { font-size: 12px; color: var(--text-color-sub); }
        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; background-color: var(--card-bg); border-top: 1px solid #EEEEEE; display: flex; justify-content: space-around; align-items: center; padding: 0 10px; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--text-color-body); cursor: pointer; }
        .nav-icon { width: 20px; height: 20px; background-repeat: no-repeat; background-size: contain; background-position: center; margin-bottom: 4px; }
        .nav-text { font-size: 12px; font-weight: 500; }
        .nav-item.active { color: var(--primary-color); }
        .nav-item-record .nav-icon { background-image: var(--icon-record); }
        .nav-item-needs .nav-icon { background-image: var(--icon-needs); }
        .nav-item-short-link .nav-icon { background-image: var(--icon-link); }
        .nav-item-record.active .nav-icon { background-image: var(--icon-record-active); }
        .nav-item-needs.active .nav-icon { background-image: var(--icon-needs-active); }
        .nav-item-short-link.active .nav-icon { background-image: var(--icon-link-active); }
        .page { display: none; height: 100%; }
        .page.active { display: block; }
    </style>
</head>
<body>
    <div class="app-viewport">
    
        <div class="main-content">
            <div id="page-short-link" class="page active">
                <div class="page-header">
                    <h1>我的短链</h1>
                </div>
                <div class="coming-soon-container">
                    <div class="coming-soon-icon"></div>
                    <div class="coming-soon-text">敬请期待</div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item nav-item-record" onclick="window.location.href='record.html'">
        <div class="nav-icon"></div>
        <div class="nav-text">提报记录</div>
    </div>
    <div class="nav-item nav-item-needs" onclick="window.location.href='need.html'">
        <div class="nav-icon"></div>
        <div class="nav-text">需求列表</div>
    </div>
    <div class="nav-item nav-item-short-link active" onclick="window.location.href='shortlink.html'">
        <div class="nav-icon"></div>
        <div class="nav-text">我的短链</div>
    </div>
        </nav>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- 路由守卫：检查是否登录 ---
        const userToken = localStorage.getItem('user_token');
        if (!userToken) {
            alert("请先登录！");
            window.location.href = 'login.html';
        }
    });
    </script>
</body>
</html>
